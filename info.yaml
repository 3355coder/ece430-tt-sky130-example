# Tiny Tapeout Project Information
project:
  title:        "Traffic Light Controller"
  description:  "A timed FSM cycling Green, Yellow, and Red lights."
  how_it_works: "Uses a state machine and a counter to transition states after specific clock cycles."
  how_to_test:  "Apply reset, then observe uo_out pins 0, 1, and 2 cycling in order."
  language:     "Verilog"
  top_module:   "tt_um_traffic_light_controller" # Must match your Verilog module name
  source_files:
    - "project.v"

